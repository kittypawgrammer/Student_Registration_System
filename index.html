<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration System</title>

</head>

<body>

    <!-- Header -->
    <header>
        <div >
            <h1>
                Student Registration System
            </h1>
            <h3>
                Smart Student Data Management Platform
            </h3>

            <p>
                (A simple and responsive system to register and manage student records efficiently.)
            </p>
        </div>
    </header>

    <!-- Main Section -->
    <main>

        <!-- Form Section -->
        <section>

            <h2>
                Register Student
            </h2>

            <form id="studentForm">

                <!-- Student ID -->
                <div>
                    <label>Student ID</label>
                    <input type="text" id="studentId" placeholder="Enter ID" required
                        pattern="[A-Za-z0-9 ]+">
                </div>

                <!-- Name -->
                <div class="">
                    <label>Student Name:</label>
                    <input type="text" id="name" placeholder="Enter student name"
                        equired pattern="[A-Za-z ]+">
                </div>


                <!-- Email -->
                <div>
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>

                <!-- Contact -->
                <div>
                    <label>Contact Number</label>
                    <input type="text" id="contact" placeholder="Enter contact"
                        required pattern="[0-9 {10}]">
                </div>

                <!-- Button -->

                <button type="submit">
                    Add Student
                </button>

            </form>
        </section>

        <!-- Display Section -->
        <section>

            <h2>
                Registered Students
            </h2>

            <div>
                <table>

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Contact</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                    </tbody>

                </table>
            </div>

        </section>

    </main>

    <script src="./js/script.js"></script>

</body>

</html>
